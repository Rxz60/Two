<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحث سكربتات 🔥</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
font-family:'Cairo',sans-serif;
background:#000;
color:#fff;
padding:30px;
min-height:100vh;
}
.title{
font-size:45px;
font-weight:900;
text-align:center;
color:red;
margin-bottom:30px;
text-shadow:0 0 25px red;
}
.search{
display:flex;
gap:10px;
max-width:800px;
margin:auto;
margin-bottom:40px;
}
.search input{
flex:1;
padding:18px;
border:none;
outline:none;
border-radius:20px;
background:#111;
color:white;
font-size:18px;
border:2px solid #500;
}
.search button{
padding:18px 35px;
border:none;
border-radius:20px;
background:#900;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
.search button:hover{
background:red;
}
.results{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}
.card{
background:#111;
border:2px solid #500;
border-radius:25px;
overflow:hidden;
transition:.3s;
box-shadow:0 0 25px rgba(255,0,0,.2);
}
.card:hover{
transform:translateY(-5px);
border-color:red;
box-shadow:0 0 40px rgba(255,0,0,.5);
}
.card img{
width:100%;
height:190px;
object-fit:cover;
}
.content{
padding:20px;
}
.name{
font-size:24px;
font-weight:900;
margin-bottom:10px;
}
.game{
color:#ff5555;
margin-bottom:10px;
}
.views{
margin-bottom:15px;
color:#aaa;
}
.script{
background:#000;
padding:12px;
border-radius:15px;
font-size:13px;
overflow:auto;
max-height:140px;
border:1px solid #333;
margin-bottom:15px;
direction:ltr;
text-align:left;
}
.copy{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:#900;
color:white;
font-weight:bold;
cursor:pointer;
}
.copy:hover{
background:red;
}
.loading{
text-align:center;
font-size:30px;
color:red;
}
</style>
</head>
<body>
<div class="title">🔥 محرك بحث سكربتات روبلكس</div>
<div class="search">
<input type="text" id="query" placeholder="ابحث عن أي سكربت...">
<button onclick="searchScripts()">
🔍 بحث
</button>
</div>
<div class="results" id="results"></div>
<script>
async function searchScripts(){
const q = document.getElementById("query").value;
const results = document.getElementById("results");
if(!q) return;
results.innerHTML = `
<div class="loading">
⏳ جاري البحث...
</div>
`;
try{
const response = await fetch(
`https://scriptblox.com/api/script/search?q=${encodeURIComponent(q)}`
);
const data = await response.json();
results.innerHTML = "";
if(!data.result.scripts.length){
results.innerHTML = `
<div class="loading">
🚫 ما حصلت نتائج
</div>
`;
return;
}
data.result.scripts.forEach(script => {
const image =
script.game.imageUrl ||
"https://tr.rbxcdn.com/default";
results.innerHTML += `
<div class="card">
<img src="${image}">
<div class="content">
<div class="name">
${script.title}
</div>
<div class="game">
🎮 ${script.game.name}
</div>
<div class="views">
👁️ ${script.views} مشاهدة
</div>
<div class="script">
${script.script}
</div>
<button class="copy"
onclick='copyScript(${JSON.stringify(script.script)})'>
📋 نسخ السكربت
</button>
</div>
</div>
`;
});
}catch(err){
results.innerHTML = `
<div class="loading">
❌ صار خطأ
</div>
`;
}
}
function copyScript(text){
navigator.clipboard.writeText(text);
alert("✅ تم نسخ السكربت");
}
</script>
</body>
</html>
``
