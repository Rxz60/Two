<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 محرك بحث سكربتات روبلكس</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
font-family:'Cairo',sans-serif;
background:
radial-gradient(circle at top,#220000,#000000 50%);
min-height:100vh;
padding:25px;
overflow-x:hidden;
color:white;
}
/* خلفية حمراء غامقة */
.bg{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
box-shadow:
inset 0 0 250px rgba(255,0,0,.15),
inset 0 0 500px rgba(120,0,0,.3),
0 0 250px rgba(255,0,0,.15);
animation:bg 3s infinite alternate;
}
@keyframes bg{
0%{
filter:brightness(1);
}
100%{
filter:brightness(1.3);
}
}
.wrap{
position:relative;
z-index:2;
max-width:1400px;
margin:auto;
}
.logo{
font-size:70px;
font-weight:900;
text-align:center;
color:#ff0000;
margin-top:30px;
margin-bottom:50px;
text-shadow:
0 0 20px #ff0000,
0 0 40px #cc0000,
0 0 80px #990000,
0 0 140px #550000;
animation:glow 1.2s infinite alternate;
}
@keyframes glow{
0%{
transform:scale(1);
}
100%{
transform:scale(1.02);
}
}
.search-box{
display:flex;
gap:18px;
margin-bottom:45px;
}
.search-input{
flex:1;
height:80px;
background:#050505;
border:2px solid #400000;
border-radius:28px;
padding:0 30px;
font-size:28px;
color:white;
outline:none;
box-shadow:
0 0 30px rgba(255,0,0,.15),
inset 0 0 25px rgba(255,0,0,.08);
transition:.3s;
}
.search-input:focus{
border-color:red;
box-shadow:
0 0 50px rgba(255,0,0,.5),
0 0 120px rgba(255,0,0,.25),
inset 0 0 30px rgba(255,0,0,.15);
}
.search-btn{
width:180px;
border:none;
border-radius:28px;
background:linear-gradient(180deg,#ff0000,#8b0000);
color:white;
font-size:30px;
font-weight:900;
cursor:pointer;
transition:.3s;
box-shadow:
0 0 40px rgba(255,0,0,.5),
0 0 100px rgba(255,0,0,.2);
}
.search-btn:hover{
transform:scale(1.05);
box-shadow:
0 0 60px rgba(255,0,0,.9),
0 0 150px rgba(255,0,0,.4);
}
.results{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(350px,1fr));
gap:35px;
}
.card{
background:
linear-gradient(180deg,#090909,#030303);
border:2px solid #2b0000;
border-radius:30px;
overflow:hidden;
transition:.3s;
box-shadow:
0 0 35px rgba(255,0,0,.12),
inset 0 0 20px rgba(255,0,0,.06);
}
.card:hover{
transform:translateY(-10px);
border-color:#ff0000;
box-shadow:
0 0 80px rgba(255,0,0,.45),
0 0 150px rgba(255,0,0,.15);
}
.card img{
width:100%;
height:220px;
object-fit:cover;
border-bottom:2px solid #250000;
}
.card-content{
padding:25px;
}
.script-title{
font-size:30px;
font-weight:900;
margin-bottom:12px;
color:#ff2b2b;
text-shadow:
0 0 15px rgba(255,0,0,.5);
}
.game-name{
font-size:19px;
color:#ff6666;
margin-bottom:12px;
}
.views{
font-size:17px;
color:#999;
margin-bottom:20px;
}
.script-box{
background:#000;
border:1px solid #300000;
border-radius:18px;
padding:16px;
height:170px;
overflow:auto;
font-size:13px;
line-height:1.7;
direction:ltr;
text-align:left;
margin-bottom:18px;
color:#ffb3b3;
}
.copy-btn{
width:100%;
height:60px;
border:none;
border-radius:18px;
background:
linear-gradient(180deg,#c40000,#700000);
font-size:22px;
font-weight:900;
color:white;
cursor:pointer;
transition:.3s;
}
.copy-btn:hover{
background:red;
box-shadow:
0 0 40px rgba(255,0,0,.7);
}
.loading{
text-align:center;
font-size:45px;
font-weight:900;
color:red;
margin-top:70px;
text-shadow:0 0 25px red;
}
::-webkit-scrollbar{
width:8px;
}
::-webkit-scrollbar-thumb{
background:red;
border-radius:20px;
}
@media(max-width:700px){
.logo{
font-size:48px;
}
.search-box{
flex-direction:column;
}
.search-btn{
width:100%;
height:80px;
}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
<div class="logo">
🔥 محرك بحث سكربتات روبلكس
</div>
<div class="search-box">
<input
type="text"
id="search"
class="search-input"
placeholder="ابحث عن أي سكربت..."
>
<button
class="search-btn"
onclick="searchScripts()"
>
🔍 بحث
</button>
</div>
<div class="results" id="results"></div>
</div>
<script>
async function searchScripts(){
const query =
document.getElementById("search").value;
const results =
document.getElementById("results");
if(!query) return;
results.innerHTML = `
<div class="loading">
⏳ جاري البحث...
</div>
`;
try{
const response = await fetch(
`https://scriptblox.com/api/script/search?q=${encodeURIComponent(query)}`
);
const data = await response.json();
results.innerHTML = "";
if(!data.result.scripts.length){
results.innerHTML = `
<div class="loading">
🚫 ما حصلت نتائج
</div>
`;
return;
}
data.result.scripts.forEach(script=>{
const image =
script.game?.imageUrl ||
"https://tr.rbxcdn.com/default";
const code =
(script.script || "لا يوجد سكربت")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
results.innerHTML += `
<div class="card">
<img src="${image}">
<div class="card-content">
<div class="script-title">
${script.title}
</div>
<div class="game-name">
🎮 ${script.game?.name || "Unknown"}
</div>
<div class="views">
👁️ ${script.views || 0} مشاهدة
</div>
<div class="script-box">
${code}
</div>
<button
class="copy-btn"
onclick='copyScript(${JSON.stringify(script.script)})'
>
📋 نسخ السكربت
</button>
</div>
</div>
`;
});
}catch(err){
results.innerHTML = `
<div class="loading">
❌ فشل البحث
</div>
`;
}
}
function copyScript(text){
navigator.clipboard.writeText(text);
alert("✅ تم نسخ السكربت");
}
</script>
</body>
</html>
